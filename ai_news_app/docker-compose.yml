services:
  ai-news-app:
    build: .
    image: ai-news-app:latest
    container_name: ai_news_app
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - news_data:/app/data
    env_file:
      - .env
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

volumes:
  news_data:

networks:
  app-network:
    driver: bridge
